<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Validade - SuperVille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#F3F3F3; --card:#FFFFFF; --border:#E2E2E2; --border-strong:#C6C6C6;
    --text:#0B0B0A; --text-2:#585858; --text-3:#8C8C8C;
    --ink:#0B0B0A; --ink-2:#1A1A1A;
    --brand:#3DAB5D; --brand-dark:#298246; --brand-light:#E7F7EC;
    --vencido:#E24B4A; --vencido-bg:#FCEBEB; --vencido-tx:#791F1F;
    --urgente:#D85A30; --urgente-bg:#FAECE7; --urgente-tx:#712B13;
    --atencao:#BA7517; --atencao-bg:#FAEEDA; --atencao-tx:#633806;
    --normal:#3DAB5D; --normal-bg:#E7F7EC; --normal-tx:#1F6E3B;
    --tratado:#5A5A5A; --tratado-bg:#EDEDED; --tratado-tx:#3A3A3A;
    --promo:#0B0B0A; --promo-bg:#E9E9E9; --promo-tx:#0B0B0A;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--ink);border-bottom:1px solid #000;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .leaf{flex-shrink:0;}
  .brand h1{font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;margin:0;color:#fff;letter-spacing:0.01em;line-height:1.1;}
  .brand span{font-size:11px;color:#B7B6AF;letter-spacing:0.12em;text-transform:lowercase;}
  .role-select{display:flex;align-items:center;gap:8px;font-size:13px;color:#D8D7D0;}
  .role-select select{background:var(--ink-2);color:#fff;border:1px solid #38372F;}
  select, input[type=text], input[type=number], textarea{
    font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--border-strong);
    border-radius:6px;background:#fff;color:var(--text);
  }
  nav{display:flex;gap:4px;padding:10px 24px 0;background:var(--card);border-bottom:1px solid var(--border);}
  nav button{
    border:none;background:transparent;padding:10px 16px;font-size:13px;color:var(--text-2);
    cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',inherit;font-weight:500;
  }
  nav button.active{color:var(--brand-dark);border-bottom-color:var(--brand);font-weight:700;}
  main{padding:24px;max-width:1200px;margin:0 auto;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .card .num{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:600;}
  .card .lbl{font-size:12px;color:var(--text-2);margin-top:2px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:bold;}
  .b-vencido{background:var(--vencido-bg);color:var(--vencido-tx);}
  .b-urgente{background:var(--urgente-bg);color:var(--urgente-tx);}
  .b-atencao{background:var(--atencao-bg);color:var(--atencao-tx);}
  .b-normal{background:var(--normal-bg);color:var(--normal-tx);}
  .b-tratado{background:var(--tratado-bg);color:var(--tratado-tx);}
  .b-promo{background:var(--promo-bg);color:var(--promo-tx);}
  .tag-promo{display:inline-block;font-size:10px;background:var(--promo-bg);color:var(--promo-tx);border-radius:4px;padding:1px 6px;margin-left:6px;font-weight:bold;}
  tr.row-promo{background:var(--promo-bg);border-left:3px solid var(--promo);}
  tr.row-promo td{border-bottom-color:#D8D8D8;}
  tr.row-vencido{background:var(--vencido-bg);border-left:3px solid var(--vencido);}
  tr.row-vencido td{border-bottom-color:#F3D2D2;}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;font-size:13px;}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);}
  th{background:#FAF9F6;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:0.03em;}
  tr:last-child td{border-bottom:none;}
  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;}
  .btn:hover{background:var(--brand-dark);}
  .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border-strong);font-weight:500;}
  .btn.secondary:hover{background:#fafaf8;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .section-title{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;margin:0 0 12px;color:var(--ink);}
  .drop{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:32px;text-align:center;color:var(--text-2);background:var(--card);cursor:pointer;}
  .drop.over{border-color:var(--brand);background:var(--brand-light);}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
  .row-actions{display:flex;gap:6px;align-items:center;}
  .muted{color:var(--text-3);font-size:12px;}
  .import-log{margin-top:14px;font-size:13px;background:var(--brand-light);border-radius:8px;padding:12px 14px;color:var(--brand);}
  .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:#fff;border-radius:var(--radius);padding:22px;width:340px;}
  .modal h3{margin:0 0 14px;font-size:15px;}
  .modal label{font-size:12px;color:var(--text-2);display:block;margin:10px 0 4px;}
  .modal input, .modal select{width:100%;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .empty{padding:40px;text-align:center;color:var(--text-3);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .lock-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0B0B0A;display:flex;align-items:center;justify-content:center;z-index:100;}
  .lock-card{background:#1A1A1A;border-radius:18px;padding:40px 36px;width:320px;text-align:center;}
  .lock-eyebrow{font-size:11px;font-weight:bold;color:var(--brand);letter-spacing:0.14em;text-transform:uppercase;margin:18px 0 6px;}
  .lock-title{font-family:'Fredoka',sans-serif;font-weight:600;font-size:22px;margin:0;color:#FFFFFF;}
  .lock-subtitle{font-size:13px;color:#8C8C8C;display:block;margin-top:8px;}
  .lock-field-label{font-size:11px;color:#8C8C8C;letter-spacing:0.08em;text-transform:uppercase;display:block;text-align:left;margin:16px 0 6px;}
  .lock-input{width:100%;background:#141414;border:1px solid #2C2C2C;color:#FFFFFF;border-radius:8px;padding:11px 12px;font-size:14px;font-family:inherit;}
  .lock-input::placeholder{color:#5A5A5A;}
  .lock-input:focus{outline:none;border-color:var(--brand);}
  .lock-btn{width:100%;background:var(--brand);color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;font-family:inherit;}
  .lock-btn:hover{background:var(--brand-dark);}
  .lock-error{color:#F0997B;font-size:12px;min-height:16px;margin-top:10px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img id="header-logo" alt="SuperVille" style="width:34px;height:34px;border-radius:6px;object-fit:cover;">
    <div><h1>SuperVille <span style="font-weight:500;color:#B7B6AF;">| validade</span></h1><span id="storage-note">carregando...</span></div>
  </div>
  <div class="role-select" id="user-info" style="display:none;">
    <span id="user-label"></span>
    <button class="btn secondary" onclick="logout()" style="padding:6px 12px;">Sair</button>
  </div>
</header>

<div id="lock-screen" class="lock-screen">
  <div class="lock-card">
    <img id="lock-logo" alt="SuperVille" style="width:120px;border-radius:8px;object-fit:cover;">
    <div class="lock-eyebrow">SuperVille</div>
    <h1 class="lock-title">Controle de validade</h1>
    <span class="lock-subtitle">Acesso restrito. Faça login para continuar.</span>
    <div style="margin-top:6px;">
      <label class="lock-field-label">Login</label>
      <select id="login-user" class="lock-input">
        <option value="Prevenção">Prevenção</option>
        <option value="Comercial">Comercial</option>
        <option value="Loja1">Loja1</option>
      </select>
      <label class="lock-field-label">Senha</label>
      <input type="password" id="login-senha" class="lock-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
      <div id="login-erro" class="lock-error"></div>
      <button class="lock-btn" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
</div>

<div id="app-shell" style="display:none;">
<nav id="tabs"></nav>

<main id="main"></main>

<div id="modal-root"></div>
</div>

  }catch(e){ console.error('erro ao carregar deptoNomes', e); deptoNomes = deptoNomes || {}; }

}
async function saveAll(){

  try{ await db.collection(FIRESTORE_COLLECTION).doc('ativos').set({json: JSON.stringify(ativos)}); }catch(e){ console.error('erro ao salvar ativos', e); }
  try{ await db.collection(FIRESTORE_COLLECTION).doc('historico').set({json: JSON.stringify(historico)}); }catch(e){ console.error('erro ao salvar historico', e); }

}
function iniciarSincronizacaoTempoReal(){
  unsubAtivos = db.collection(FIRESTORE_COLLECTION).doc('ativos').onSnapshot(snap=>{
    if(syncEmAndamento) return;
    ativos = snap.exists ? JSON.parse(snap.data().json || '[]') : [];
    render();
  });
  unsubHistorico = db.collection(FIRESTORE_COLLECTION).doc('historico').onSnapshot(snap=>{
    if(syncEmAndamento) return;
    historico = snap.exists ? JSON.parse(snap.data().json || '[]') : [];
    render();
  });
  unsubDeptos = db.collection(FIRESTORE_COLLECTION).doc('deptoNomes').onSnapshot(snap=>{
    if(syncEmAndamento) return;
    deptoNomes = snap.exists ? JSON.parse(snap.data().json || '{}') : {};
    render();
  });
}
function pararSincronizacao(){
  if(unsubAtivos) unsubAtivos();
  if(unsubHistorico) unsubHistorico();
  if(unsubDeptos) unsubDeptos();
  unsubAtivos = unsubHistorico = unsubDeptos = null;
}

// =====================================================================
// DATE HELPERS
// =====================================================================
function parseDateBR(s){
  const [d,m,y] = s.split('/').map(Number);
  return new Date(y, m-1, d);
}
function todayStr(){
  const t = new Date();
  return String(t.getDate()).padStart(2,'0')+'/'+String(t.getMonth()+1).padStart(2,'0')+'/'+t.getFullYear();
}
function diasParaVencer(dtValidade){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const val = parseDateBR(dtValidade);
  return Math.round((val - hoje)/(1000*60*60*24));
}
function computeStatus(item){
  const dias = diasParaVencer(item.dtValidade);
  if(dias < 0) return 'Vencido';
  if(item.emPromocao) return 'Em promoção';
  if(dias <= 2) return 'Urgente';
  if(dias <= 7) return 'Atenção';
  return 'Normal';
}
function statusBadgeClass(s){
  return {Vencido:'b-vencido',Urgente:'b-urgente','Atenção':'b-atencao',Normal:'b-normal',Tratado:'b-tratado','Rebaixado':'b-tratado','Em promoção':'b-promo'}[s]||'b-normal';
}

// =====================================================================
// RECOMPUTE: move vencidos pendentes para historico
// =====================================================================
function recompute(){
  const stillActive = [];
  ativos.forEach(item=>{
    const status = computeStatus(item);
    if(status === 'Vencido'){
      historico.push({...item, status:'Vencido', dataMovido: todayStr()});
    } else {
      item.status = status;
      stillActive.push(item);
    }
  });
  ativos = stillActive;
}

// =====================================================================
// PARSING: PDF (texto) e XLSX
// =====================================================================
const LINE_RE = /(\d{3,7}-\d)\s+(.+?)\s+(\d{2}\/\d{2}\/\d{4})\s+CAD\.\s+(\d{2}\/\d{2}\/\d{4})\s+(-?\d+)\s+(\d+)\s+(?:([A-Z])\s+)?([\d]+\.\d{2})/g;

function parseReportText(text){
  const clean = text.replace(/\s+/g,' ');
  const rows = [];
  let match;
  LINE_RE.lastIndex = 0;
  while((match = LINE_RE.exec(clean)) !== null){
    rows.push({
      plu: match[1],
      desc: match[2].trim(),
      dtEntrada: match[3],
      dtValidade: match[4],
      estoque: parseInt(match[5],10),
      saldo: parseInt(match[6],10),
      tipoFlag: match[7] || '',
      preco: parseFloat(match[8])
    });
  }
  return rows;
}

async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let fullText = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return fullText;
}

function parseXlsx(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const wb = XLSX.read(e.target.result, {type:'binary', cellDates:false});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
        const rows = [];
        json.forEach(r=>{
          if(!r || !r[0]) return;
          const plu = String(r[0]);
          if(!/^\d{3,7}-\d$/.test(plu)) return;
          const dtEnt = normalizeDate(r[2]);
          const dtVal = normalizeDate(r[4]);
          if(!dtEnt || !dtVal) return;
          const flagRaw = r[7]!==undefined && r[7]!==null ? String(r[7]).trim().toUpperCase() : '';
          const tipoFlag = /^[A-Z]$/.test(flagRaw) ? flagRaw : '';
          rows.push({
            plu, desc: String(r[1]||'').trim(), dtEntrada: dtEnt, dtValidade: dtVal,
            estoque: parseInt(r[5],10)||0, saldo: parseInt(r[6],10)||0, tipoFlag,
            preco: parseFloat(String(r[8]||0).replace(',','.'))||0
          });
        });
        resolve(rows);
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}
function normalizeDate(v){
  if(!v) return null;
  const s = String(v).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  return null;
}

// =====================================================================
// MERGE / IMPORT
// =====================================================================
function mergeImport(rows, setorManual){
  let added=0, skipExist=0, skipTratado=0, semCadastro=0;
  rows.forEach(r=>{
    const chave = r.plu+'|'+r.dtValidade;
    const existente = ativos.find(a=>a.chave===chave);
    if(existente){
      if(r.tipoFlag === 'P' && !existente.emPromocao){ existente.emPromocao = true; }
      skipExist++; return;
    }
    if(historico.some(h=>h.chave===chave)){ skipTratado++; return; }
    const deptoCatalogo = CATALOGO_PLU_DEPTO[r.plu];
    const setor = deptoCatalogo || setorManual || '';
    if(!deptoCatalogo) semCadastro++;
    ativos.push({
      chave, plu:r.plu, desc:r.desc, setor, dtEntrada:r.dtEntrada, dtValidade:r.dtValidade,
      estoque:r.estoque, saldo:r.saldo, preco:r.preco, status:'Pendente', tratativa:'Pendente',
      responsavel:'', dataTratativa:'', valorRebaixa:'',
      emPromocao: r.tipoFlag === 'P',
      dataCadastro: todayStr()
    });
    added++;
  });
  recompute();
  return {added, skipExist, skipTratado, semCadastro};
}

  else main.innerHTML = renderImportar();

  const counts = {Vencido:0,Urgente:0,'Atenção':0,Normal:0,'Em promoção':0};

  const naoVistos = historico.filter(h=>h.tratativa==='Rebaixado' && h.vistoOperacao===false).length;

  const bySetor = {};
  ativos.forEach(a=>{
    if(a.status==='Vencido'||a.status==='Urgente'||a.status==='Atenção'){
      bySetor[nomeDepto(a.setor)] = (bySetor[nomeDepto(a.setor)]||0)+1;
    }
  });
  const setorRows = Object.keys(bySetor).length
    ? Object.entries(bySetor).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`<tr><td>${s}</td><td>${c}</td></tr>`).join('')
    : `<tr><td colspan="2" class="empty">Nenhum item pendente ainda</td></tr>`;

  return `
    <div class="cards">
      <div class="card"><div class="num" style="color:var(--vencido)">${counts['Vencido']}</div><div class="lbl">Vencidos</div></div>
      <div class="card"><div class="num" style="color:var(--urgente)">${counts['Urgente']}</div><div class="lbl">Urgentes</div></div>
      <div class="card"><div class="num" style="color:var(--atencao)">${counts['Atenção']}</div><div class="lbl">Atenção</div></div>
      <div class="card"><div class="num" style="color:var(--normal)">${counts['Normal']}</div><div class="lbl">Normal</div></div>
      <div class="card"><div class="num" style="color:var(--promo)">${counts['Em promoção']}</div><div class="lbl">Em rebaixa</div></div>
      <div class="card"><div class="num" style="color:var(--brand-dark)">${naoVistos}</div><div class="lbl">Rebaixas p/ operação ver</div></div>
    </div>
    <div class="panel">
      <div class="section-title">Departamentos com itens pendentes</div>
      <table><thead><tr><th>Departamento</th><th>Qtd. pendente</th></tr></thead><tbody>${setorRows}</tbody></table>
    </div>
  `;
}

function renderPainelComercial(){
  const pendenteEnvio = historico.filter(h=>h.tratativa==='Rebaixado' && !h.enviadoOperacao);
  const pendentes = ativos.length;
  const envioBlock = pendenteEnvio.length ? `
    <div class="panel">
      <div class="section-title">Rebaixas registradas, aguardando envio (${pendenteEnvio.length})</div>
      <table><thead><tr><th>Descrição</th><th>Departamento</th><th>Valor</th><th>Data</th><th></th></tr></thead><tbody>
      ${pendenteEnvio.map(i=>`<tr><td>${i.desc}</td><td>${nomeDepto(i.setor)}</td><td>R$ ${Number(i.valorRebaixa||0).toFixed(2)}</td><td>${i.dataTratativa}</td>
        <td><button class="btn secondary" onclick="enviarParaOperacao('${i.chave}')">Enviar</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:14px;"><button class="btn" onclick="enviarTodasParaOperacao()">Enviar todas para operação</button></div>
    </div>` : `
    <div class="panel"><div class="empty">Nenhuma rebaixa registrada aguardando envio.</div></div>`;
  return `
    ${envioBlock}
    <div class="panel">
      <div class="section-title">Itens ativos pra rebaixar</div>
      <p class="muted" style="margin-bottom:14px;">${pendentes} ${pendentes===1?'item':'itens'} na lista.</p>
      <button class="btn" onclick="setTab('ativos')">Ver itens ativos</button>
    </div>
  `;
}

function renderPainelOperacao(){
  const pendentes = ativos.length;

  let emRebaixa = ativos.filter(a=>a.emPromocao);
  let rebaixasComercial = historico.filter(h=>h.tratativa==='Rebaixado' && h.enviadoOperacao);
  if(filterSetorOperacao){
    emRebaixa = emRebaixa.filter(a=>a.setor===filterSetorOperacao);
    rebaixasComercial = rebaixasComercial.filter(h=>h.setor===filterSetorOperacao);
  }
  emRebaixa = emRebaixa.slice().sort((a,b)=>diasParaVencer(a.dtValidade)-diasParaVencer(b.dtValidade));
  rebaixasComercial = rebaixasComercial.slice().sort((a,b)=>(b.dataTratativa||'').localeCompare(a.dataTratativa||''));

  const codigosComItens = codigosDeptoConhecidos();

  return `
    <div class="panel">
      <div class="toolbar">
        <div class="filters">
          <select onchange="filterSetorOperacao=this.value; render()">
            <option value="">Todos os departamentos</option>
            ${codigosComItens.map(c=>`<option value="${c}" ${filterSetorOperacao===c?'selected':''}>${nomeDepto(c)}</option>`).join('')}
          </select>
        </div>
        <div style="flex:1"></div>
        <button class="btn" onclick="exportPdfOperacao()">Gerar PDF pra imprimir</button>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Itens já em rebaixa (${emRebaixa.length})</div>
      <table><thead><tr><th>Setor</th><th>Descrição</th><th>Estoque</th><th>Saldo</th><th>Preço</th></tr></thead><tbody>
      ${emRebaixa.length ? emRebaixa.map(a=>`<tr><td>${nomeDepto(a.setor)}</td><td>${a.desc}</td><td>${a.estoque}</td><td>${a.saldo}</td><td>R$ ${Number(a.preco||0).toFixed(2)}</td></tr>`).join('')
        : `<tr><td colspan="5" class="empty">Nenhum item em rebaixa com esse filtro</td></tr>`}
      </tbody></table>
    </div>

    <div class="panel">
      <div class="section-title">Rebaixas feitas pelo comercial (${rebaixasComercial.length})</div>
      <table><thead><tr><th>Setor</th><th>Descrição</th><th>Estoque</th><th>Saldo</th><th>Preço de</th><th>Preço por</th><th>Data</th><th></th></tr></thead><tbody>
      ${rebaixasComercial.length ? rebaixasComercial.map(h=>`<tr><td>${nomeDepto(h.setor)}</td><td>${h.desc}</td><td>${h.estoque??'-'}</td><td>${h.saldo??'-'}</td><td>R$ ${Number(h.preco||0).toFixed(2)}</td><td><strong>R$ ${Number(h.valorRebaixa||0).toFixed(2)}</strong></td><td>${h.dataTratativa}</td>
        <td>${!h.vistoOperacao ? `<button class="btn secondary" onclick="marcarVisto('${h.chave}')">Ok, vi</button>` : '<span class="muted">visto</span>'}</td></tr>`).join('')
        : `<tr><td colspan="8" class="empty">Nenhuma rebaixa enviada com esse filtro</td></tr>`}
      </tbody></table>
    </div>

    <div class="panel">
      <div class="section-title">Itens ativos aguardando tratativa</div>
      <p class="muted" style="margin-bottom:14px;">${pendentes} ${pendentes===1?'item':'itens'} na lista.</p>
      <button class="btn" onclick="setTab('ativos')">Ver itens ativos</button>
    </div>
  `;
}
function renderAtivos(){
  let list = ativos.slice();
  if(filterSetor === 'SEM_DEPTO') list = list.filter(a=>!a.setor);
  else if(filterSetor) list = list.filter(a=>a.setor===filterSetor);
  if(filterStatus) list = list.filter(a=>a.status===filterStatus);
  list.sort((a,b)=>diasParaVencer(a.dtValidade)-diasParaVencer(b.dtValidade));

  const rows = list.length ? list.map(a=>`
    <tr class="${a.emPromocao ? 'row-promo' : (a.status==='Vencido' ? 'row-vencido' : '')}">
      <td>${a.setor ? nomeDepto(a.setor) : `<select style="font-size:12px;padding:3px 6px;" onchange="definirDepartamento('${a.chave}', this.value)">
          <option value="">sem departamento</option>
          ${codigosDeptoConhecidos().map(c=>`<option value="${c}">${nomeDepto(c)}</option>`).join('')}
        </select>`}</td>
      <td>${a.desc}${a.emPromocao ? '<span class="tag-promo">em rebaixa</span>' : ''}</td>
      <td>${a.estoque}</td>
      <td>${a.saldo}</td>
      <td>${a.dtValidade}</td>
      <td>${diasParaVencer(a.dtValidade)}</td>
      <td><span class="badge ${statusBadgeClass(a.status)}">${a.status}</span></td>
      <td class="row-actions">
        ${role==='Comercial' ? `<button class="btn secondary" onclick="openRebaixaModal('${a.chave}')">${a.emPromocao?'Alterar valor':'Rebaixar'}</button>` : ''}
        ${role==='Loja/Operação' ? `<button class="btn secondary" onclick="openTratativaModal('${a.chave}')">Tratar</button>` : ''}
      </td>
    </tr>`).join('') : `<tr><td colspan="8" class="empty">Nenhum item ativo com esse filtro</td></tr>`;

  return `
    <div class="toolbar">
      <div class="filters">
        <select onchange="filterSetor=this.value; render()">
          <option value="">Todos os departamentos</option>
          <option value="SEM_DEPTO" ${filterSetor==='SEM_DEPTO'?'selected':''}>Sem departamento</option>
          ${codigosDeptoConhecidos().map(c=>`<option value="${c}" ${filterSetor===c?'selected':''}>${nomeDepto(c)}</option>`).join('')}
        </select>
        <select onchange="filterStatus=this.value; render()">
          <option value="">Todos os status</option>
          ${['Vencido','Urgente','Atenção','Normal','Em promoção'].map(s=>`<option value="${s}" ${filterStatus===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div style="flex:1"></div>
      <button class="btn secondary" onclick="exportExcel()">Exportar Excel</button>
      <button class="btn secondary" onclick="exportPdf()">Exportar PDF</button>
      ${role==='Comercial' ? `<button class="btn" onclick="enviarTodasParaOperacao()">Avisar operação das rebaixas</button>` : ''}
      ${role==='Prevenção' ? `<button class="btn secondary" style="color:var(--vencido-tx);border-color:var(--vencido);" onclick="limparAtivos()">Limpar itens ativos</button>` : ''}
    </div>
    <table>
      <thead><tr><th>Departamento</th><th>Descrição</th><th>Estoque</th><th>Saldo</th><th>Validade</th><th>Dias</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderHistorico(){
  const list = historico.slice().sort((a,b)=> (b.dataMovido||b.dataTratativa||'').localeCompare(a.dataMovido||a.dataTratativa||''));
  const rows = list.length ? list.map(h=>`
    <tr class="${h.tratativa==='Rebaixado' ? 'row-promo' : (h.status==='Vencido' ? 'row-vencido' : '')}">
      <td>${nomeDepto(h.setor)}</td>
      <td>${h.desc}</td>
      <td>${h.dtValidade}</td>
      <td><span class="badge ${statusBadgeClass(h.status)}">${h.status}</span></td>
      <td>${h.tratativa==='Rebaixado' ? ('R$ '+Number(h.valorRebaixa||0).toFixed(2)) : (h.tratativa||'-')}</td>
      <td>${h.responsavel||'-'}</td>
      <td>${h.dataTratativa||h.dataMovido||'-'}</td>
    </tr>`).join('') : `<tr><td colspan="7" class="empty">Nenhum item no histórico ainda</td></tr>`;
  return `
    <div class="toolbar"><div style="flex:1"></div>
      <button class="btn secondary" onclick="exportExcel()">Exportar Excel</button>
      ${role==='Prevenção' ? `<button class="btn secondary" style="color:var(--vencido-tx);border-color:var(--vencido);" onclick="limparHistorico()">Limpar histórico</button>` : ''}
    </div>
    <table>
      <thead><tr><th>Departamento</th><th>Descrição</th><th>Validade</th><th>Status</th><th>Tratativa / valor</th><th>Responsável</th><th>Data</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderDepartamentos(){
  const codes = codigosDeptoConhecidos();
  const rows = codes.map(c=>`
    <tr>
      <td class="muted">${c}</td>
      <td><input type="text" data-code="${c}" class="depto-input" value="${nomeDepto(c)}" style="width:100%"></td>
    </tr>`).join('');
  return `
    <div class="panel">
      <div class="section-title">Nomes dos departamentos</div>
      <p class="muted">Os códigos vêm do catálogo mercadológico. Os nomes abaixo são uma sugestão inicial baseada nos produtos mais comuns de cada código — ajuste e salve, vale para todo mundo que usa o painel.</p>
      <table><thead><tr><th>Código</th><th>Nome</th></tr></thead><tbody>${rows}</tbody></table>
      <div style="margin-top:14px;"><button class="btn" onclick="salvarDeptoNomes()">Salvar nomes</button></div>
    </div>
  `;
}
async function salvarDeptoNomes(){
  document.querySelectorAll('.depto-input').forEach(inp=>{
    deptoNomes[inp.dataset.code] = inp.value.trim();
  });
  await saveDeptoNomes();
  render();
}

function renderImportar(){
  return `
    <div class="panel">
      <div class="section-title">Enviar relatório do dia</div>
      <p class="muted">Aceita o PDF exportado do sistema ou a planilha (.xlsx). Cada item é classificado automaticamente pelo departamento do catálogo (${Object.keys(CATALOGO_PLU_DEPTO).length} produtos cadastrados) — não precisa escolher nada, é só enviar. O item já cadastrado (mesmo PLU + validade) é ignorado automaticamente. Item que não estiver no catálogo entra como "sem departamento" e pode ser classificado depois direto na lista de ativos.</p>
      <div class="drop" id="dropzone" onclick="document.getElementById('file-input').click()">
        <div>Arraste o PDF ou a planilha aqui, ou clique para escolher o arquivo</div>
        <input type="file" id="file-input" accept=".pdf,.xlsx,.xls" style="display:none">
      </div>
      <div id="import-log"></div>
    </div>
    <div class="panel">
      <div class="section-title">Ou cole o texto do relatório</div>
      <textarea id="paste-area" rows="6" style="width:100%" placeholder="Cole aqui o texto copiado do relatório em PDF, caso o upload não funcione"></textarea>
      <div style="margin-top:10px;">
        <button class="btn" onclick="handlePaste()">Processar texto colado</button>
      </div>
    </div>
  `;
}

function attachImportHandlers(){
  const dz = document.getElementById('dropzone');
  const fi = document.getElementById('file-input');
  if(!dz) return;
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('over'));
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('over');
    if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change', e=>{
    if(e.target.files.length) handleFile(e.target.files[0]);
  });
}

async function handleFile(file){
  const log = document.getElementById('import-log');
  log.innerHTML = `<div class="import-log">Lendo arquivo...</div>`;
  try{
    let rows = [];
    if(file.name.toLowerCase().endsWith('.pdf')){
      const text = await extractPdfText(file);
      rows = parseReportText(text);
    } else {
      rows = await parseXlsx(file);
    }
    if(!rows.length){
      document.getElementById('import-log').innerHTML = `<div class="import-log">Não encontrei linhas de produto reconhecíveis nesse arquivo. Tente colar o texto manualmente abaixo.</div>`;
      return;
    }
    const result = mergeImport(rows);
    await saveAll();
    render();
    document.getElementById('import-log').innerHTML = mensagemImportacao(result);
  }catch(err){
    document.getElementById('import-log').innerHTML = `<div class="import-log">Erro ao ler o arquivo: ${err.message}. Tente colar o texto manualmente abaixo.</div>`;
  }
}

function mensagemImportacao(result){
  return `<div class="import-log" style="background:var(--brand-light);border:1px solid var(--brand);color:var(--brand-dark);font-weight:600;">
    ✓ Arquivo importado com sucesso — ${result.added} ${result.added===1?'item novo adicionado':'itens novos adicionados'} · ${result.skipExist} já estavam ativos · ${result.skipTratado} já tinham sido tratados${result.semCadastro ? ' · ' + result.semCadastro + ' sem departamento no catálogo' : ''}.
  </div>`;
}

async function handlePaste(){
  const text = document.getElementById('paste-area').value;
  const log = document.getElementById('import-log');
  const rows = parseReportText(text);
  if(!rows.length){
    log.innerHTML = `<div class="import-log">Não encontrei linhas de produto reconhecíveis no texto colado.</div>`;
    return;
  }
  const result = mergeImport(rows);
  await saveAll();
  render();
  document.getElementById('import-log').innerHTML = mensagemImportacao(result);
}

// =====================================================================
// LOGIN
// =====================================================================
const USUARIOS = {
  'Prevenção': { senha:'1', role:'Prevenção' },
  'Comercial': { senha:'1', role:'Comercial' },
  'Loja1':     { senha:'1', role:'Loja/Operação' },
};

async function fazerLogin(){
  const user = document.getElementById('login-user').value;
  const senha = document.getElementById('login-senha').value;
  const erro = document.getElementById('login-erro');
  const conta = USUARIOS[user];
  if(!conta || conta.senha !== senha){
    erro.textContent = 'Usuário ou senha incorretos.';
    return;
  }
  erro.textContent = '';
  role = conta.role;
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = '';
  document.getElementById('user-info').style.display = 'flex';
  document.getElementById('user-label').textContent = user;
  currentTab = 'painel';
  await loadAll();
  recompute();
  await saveAll();
  render();
  attachImportHandlers();
}
function logout(){
  role = '';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('user-info').style.display = 'none';
  document.getElementById('login-senha').value = '';
  document.getElementById('login-erro').textContent = '';
}

(function initLockScreen(){
  document.getElementById('header-logo').src = LOGO_SUPERVILLE;
  document.getElementById('lock-logo').src = LOGO_SUPERVILLE;
  if(window.pdfjsLib){
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
})();

const _origRender = render;
render = function(){ _origRender(); attachImportHandlers(); };
</script>
